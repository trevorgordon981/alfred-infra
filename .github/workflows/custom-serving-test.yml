name: custom-serving-test

on:
  push:
    paths:
      - "services/m3-custom-serving/**"
      - ".github/workflows/custom-serving-test.yml"
  pull_request:
    paths:
      - "services/m3-custom-serving/**"
      - ".github/workflows/custom-serving-test.yml"

permissions:
  contents: read

jobs:
  security-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Run dependency-free request/security suite
        working-directory: services/m3-custom-serving
        run: python -m unittest discover -v -s tests -p 'test_*.py'
