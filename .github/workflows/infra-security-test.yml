name: infra-security-test

on:
  push:
    paths:
      - "scripts/**"
      - "tests/test_infra_security.py"
      - ".gitignore"
      - ".github/workflows/infra-security-test.yml"
  pull_request:
    paths:
      - "scripts/**"
      - "tests/test_infra_security.py"
      - ".gitignore"
      - ".github/workflows/infra-security-test.yml"

permissions:
  contents: read

jobs:
  security-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Python and shell syntax
        run: |
          python -m compileall -q scripts tests
          find scripts -type f -name '*.sh' -exec bash -n {} +
      - name: Backup and status-API contracts
        run: python -m unittest -v tests/test_infra_security.py
