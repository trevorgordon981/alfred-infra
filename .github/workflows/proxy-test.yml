name: proxy-test

on:
  push:
    paths:
      - "services/m3-lan-proxy/**"
      - ".github/workflows/proxy-test.yml"
  pull_request:
    paths:
      - "services/m3-lan-proxy/**"
      - ".github/workflows/proxy-test.yml"

permissions:
  contents: read

jobs:
  unittest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m unittest discover -s services/m3-lan-proxy/tests -p 'test_*.py'
